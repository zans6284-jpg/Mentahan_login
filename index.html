<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-off">

    <div id="bg-wrapper">
        <video id="bg-video" autoplay loop playsinline style="display:none;"></video>
        <img id="bg-image" src="https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=1000" alt="background">
    </div>

    <div class="dark-overlay"></div>

    <div class="lamp-container">
        <div class="rope" id="lamp-rope">
            <div class="line"></div>
            <div class="handle"></div>
        </div>
        <div class="bulb"></div>
    </div>

    <div class="login-card">
        <div class="form-container">
            <h1>Sign Up</h1>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" placeholder="Enter your email" required>
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="Enter password" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>
                <button type="submit" class="btn-signup">Sign Up</button>
            </form>
            <p class="footer-text">Already Have Account?</p>
        </div>

        <div class="image-container">
            <img id="card-photo" src="https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?auto=format&fit=crop&q=80&w=500" alt="decoration">
            <button class="change-photo-btn" onclick="document.getElementById('card-photo-input').click()">
                <i class="fa-solid fa-camera"></i>
            </button>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="bg-input" accept="image/*,video/*" hidden>
        <input type="file" id="card-photo-input" accept="image/*" hidden>
        
        <button onclick="document.getElementById('bg-input').click()">Ganti Background</button>
        <button id="save-btn">Save Settings</button>
        <button id="desktop-toggle">Desktop Mode</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
